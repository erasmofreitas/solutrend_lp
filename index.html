<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solutrend Group — Technology Partners</title>
  <meta name="description" content="Solutrend Group partners with executive teams to turn complex technology into measurable business outcomes.">
  <link rel="canonical" href="https://solutrend.com/">
  <meta name="robots" content="noindex">
  <link rel="alternate" hreflang="pt" href="https://solutrend.com/pt/">
  <link rel="alternate" hreflang="en" href="https://solutrend.com/en/">
  <link rel="alternate" hreflang="es" href="https://solutrend.com/es/">
  <link rel="alternate" hreflang="x-default" href="https://solutrend.com/en/">

  <!-- Favicons (placeholders) -->
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/site.webmanifest">

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #0F172A;
      color: #E5E7EB;
    }
    .redirect-shell {
      text-align: center;
      padding: 2rem;
    }
    .redirect-shell a {
      color: #93C5FD;
    }
  </style>

  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      var hash = window.location.hash || "";

      var target = "/en/";

      if (lang.startsWith("pt")) {
        target = "/pt/";
      }
      else if (lang.startsWith("es")) {
        target = "/es/";
      }

      if (window.location.pathname === "/") {
        window.location.replace(target + hash);
      }
    })();
  </script>
</head>
<body>
  <div class="redirect-shell">
    <p>Redirecting you to your preferred language...</p>
    <noscript>
      <p>Please select your language:</p>
      <p>
        <a href="/en/">English</a> ·
        <a href="/pt/">Português</a> ·
        <a href="/es/">Español</a>
      </p>
    </noscript>
  </div>
</body>
</html>
